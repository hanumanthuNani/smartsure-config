spring:
  datasource:
    url: jdbc:mysql://mysql:3306/auth_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  rabbitmq:
    host: rabbitmq
    port: 5672
    # Optional: username/password if not using defaults
    # username: guest
    # password: guest

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.smartsure.auth: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

jwt:
  # Ensure this secret is actually long enough in production!
  secret: smartsure-secret-key-must-be-at-least-32-characters-long
  expiration: 86400000

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,tracing # Recommended for Zipkin/Actuator visibility
