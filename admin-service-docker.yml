spring:
  datasource:
    url: jdbc:mysql://mysql:3306/admin_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  cache:
    type: simple
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        auto-startup: true

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

claims:
  service:
    url: http://claims-service:8083

policy:
  service:
    url: http://policy-service:8082

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
